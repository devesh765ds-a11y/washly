<!DOCTYPE html>
<html>

<head>
<title>Garment Tracking</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

<nav>
  <div class="logo">Washly</div>
  <div>
    <a href="index.html">Home</a>
    <a href="catalogue.html">Catalogue</a>
  </div>
</nav>

<div class="tracking-container">

  <h2>Track Your Garment</h2>
  <p class="sub">Scan QR code to check status</p>

  <!-- Illustration -->
  <img class="tracking-img" src="https://cdn-icons-png.flaticon.com/512/5676/5676350.png">

  <!-- Scanner Box -->
  <div class="scanner-box">
    <div id="reader"></div>
  </div>

  <!-- Result -->
  <div id="result" class="result-box"></div>

</div>

<script>
function onScanSuccess(decodedText){

document.getElementById("result").innerHTML =
"<h3>Garment ID: "+decodedText+"</h3>"+
"<p>Status: Washing in progress</p>"

}

let scanner = new Html5QrcodeScanner(
"reader",
{fps:10, qrbox:250}
)

scanner.render(onScanSuccess)
</script>

</body>
</html>
