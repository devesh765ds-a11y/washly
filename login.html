<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Washly Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <div class="logo">Washly</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="catalogue.html">Catalogue</a>
  </div>
</nav>

<div class="main">

  <!-- LEFT: LOGIN CARD -->
  <div class="login-box">
    <h2>Welcome Back</h2>
    <p class="sub">Sign in to your account</p>

    <form>
      <input type="text" placeholder="Email">
      <input type="password" placeholder="Password">
      <button type="submit">Sign In</button>
    </form>

    <p class="signup">Don’t have an account? <span>Sign up</span></p>
  </div>

  <!-- RIGHT: VISUAL -->
  <div class="visual">
    <img src="https://cdn-icons-png.flaticon.com/512/3081/3081559.png" alt="Laundry Illustration">
  </div>

</div>

</body>
</html>
