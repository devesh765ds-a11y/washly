<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Washly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --navy: #0d1f35;
      --navy-mid: #122540;
      --navy-light: #1a3050;
      --cream: #f0e6c8;
      --cream-muted: #c9b98a;
      --white: #ffffff;
      --text-muted: rgba(240, 230, 200, 0.55);
      --border: rgba(240, 230, 200, 0.12);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 50%, var(--navy-light) 100%);
      color: var(--cream);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* BACKGROUND DECORATION */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 50%, rgba(240, 230, 200, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(240, 230, 200, 0.02) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* LAUNDRY ELEMENTS DECORATION */
    .laundry-decoration {
      position: fixed;
      opacity: 0.08;
      pointer-events: none;
      font-size: 120px;
      z-index: 0;
    }

    .decoration-1 {
      top: 10%;
      left: 5%;
      animation: float 6s ease-in-out infinite;
    }

    .decoration-2 {
      top: 60%;
      right: 5%;
      animation: float 8s ease-in-out infinite;
    }

    .decoration-3 {
      bottom: 10%;
      left: 10%;
      animation: float 7s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px) rotate(0deg);
      }
      50% {
        transform: translateY(30px) rotate(5deg);
      }
    }

    /* NAVIGATION */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      height: 64px;
      background: rgba(13, 31, 53, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 0.5px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 27px;
      font-weight: 700;
      color: var(--cream);
      text-decoration: none;
      cursor: pointer;
      letter-spacing: -0.3px;
      transition: color 0.15s;
    }

    .logo a {
      text-decoration: none;
      color: inherit;
      transition: color 0.15s;
    }

    .logo a:hover {
      color: var(--white);
    }

    .nav-links {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--cream);
      font-size: 14px;
      font-weight: 400;
      padding: 8px 18px;
      border-radius: 999px;
      transition: all 0.15s;
    }

    .nav-links a:hover {
      color: var(--white);
      background: rgba(240, 230, 200, 0.05);
    }

    /* MAIN CONTAINER */
    .login-wrapper {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: calc(100vh - 64px);
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
      gap: 4rem;
      position: relative;
      z-index: 1;
    }

    /* LOGIN CARD */
    .login-box {
      flex: 1;
      max-width: 420px;
      background: rgba(13, 31, 53, 0.7);
      backdrop-filter: blur(20px);
      border: 0.5px solid rgba(240, 230, 200, 0.15);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .login-box h2 {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 0.5rem;
    }

    .sub {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .input-group {
      position: relative;
      display: flex;
      align-items: center;
    }

    form input {
      width: 100%;
      padding: 12px 16px 12px 40px;
      background: rgba(255, 255, 255, 0.06);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      color: var(--cream);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      transition: all 0.15s;
    }

    form input::placeholder {
      color: var(--text-muted);
    }

    form input:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--cream-muted);
    }

    .input-icon {
      position: absolute;
      left: 12px;
      font-size: 18px;
      opacity: 0.6;
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-bottom: 0.5rem;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      cursor: pointer;
    }

    .checkbox-label input {
      width: auto;
      padding: 0;
      background: transparent;
      border: none;
      cursor: pointer;
    }

    .form-options a {
      color: var(--cream);
      text-decoration: none;
      transition: color 0.15s;
    }

    .form-options a:hover {
      color: var(--white);
    }

    form button[type="submit"] {
      padding: 14px 32px;
      background: var(--cream);
      color: var(--navy);
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 0.5rem;
    }

    form button[type="submit"]:hover {
      background: var(--cream-muted);
      transform: translateY(-2px);
    }

    .signup {
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 1.5rem;
    }

    .signup span {
      color: var(--cream);
      font-weight: 600;
      cursor: pointer;
      transition: color 0.15s;
    }

    .signup span:hover {
      color: var(--white);
    }

    /* VISUAL SIDE */
    .visual {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .visual img {
      max-width: 100%;
      height: auto;
      opacity: 0.9;
      animation: float 6s ease-in-out infinite;
    }

    .visual-bg {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(240, 230, 200, 0.1) 0%, transparent 70%);
      border-radius: 50%;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.1);
      }
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: rgba(13, 31, 53, 0.95);
      backdrop-filter: blur(20px);
      border: 0.5px solid var(--border);
      border-radius: 20px;
      padding: 3rem;
      max-width: 500px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .modal-content h2 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 0.5rem;
    }

    .modal-content .sub {
      margin-bottom: 2rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-row.full {
      grid-template-columns: 1fr;
    }

    .modal-content input,
    .modal-content select {
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.06);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      color: var(--cream);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      width: 100%;
      transition: all 0.15s;
    }

    .modal-content input::placeholder,
    .modal-content select::placeholder {
      color: var(--text-muted);
    }

    .modal-content input:focus,
    .modal-content select:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--cream-muted);
    }

    .modal-content select {
      cursor: pointer;
    }

    .modal-content select option {
      background: var(--navy);
      color: var(--cream);
    }

    .terms-checkbox {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 1.5rem 0;
      font-size: 13px;
      color: var(--text-muted);
    }

    .terms-checkbox input {
      width: 18px;
      height: 18px;
      min-width: 18px;
      margin-top: 2px;
      cursor: pointer;
      padding: 0;
      background: rgba(255, 255, 255, 0.06);
    }

    .terms-checkbox a {
      color: var(--cream);
      text-decoration: none;
    }

    .terms-checkbox a:hover {
      text-decoration: underline;
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 2rem;
    }

    .modal-buttons button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 14px;
    }

    .btn-primary {
      background: var(--cream);
      color: var(--navy);
    }

    .btn-primary:hover {
      background: var(--cream-muted);
    }

    .btn-secondary {
      background: transparent;
      color: var(--cream);
      border: 0.5px solid var(--border);
    }

    .btn-secondary:hover {
      background: rgba(240, 230, 200, 0.1);
      border-color: var(--cream);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* RESPONSIVE */
    @media (max-width: 968px) {
      .login-wrapper {
        flex-direction: column;
        justify-content: center;
        gap: 2rem;
      }

      .visual {
        order: -1;
      }

      .login-box {
        max-width: 100%;
      }

      .visual-bg {
        width: 300px;
        height: 300px;
      }
    }

    @media (max-width: 600px) {
      nav {
        padding: 0 1.5rem;
      }

      .nav-links a {
        display: none;
      }

      .login-box {
        padding: 2rem 1.5rem;
      }

      .login-box h2 {
        font-size: 28px;
      }

      .modal-content {
        padding: 2rem 1.5rem;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      .laundry-decoration {
        font-size: 80px;
      }
    }
  </style>
</head>

<body>

<!-- DECORATIVE ELEMENTS -->
<div class="laundry-decoration decoration-1">👕</div>
<div class="laundry-decoration decoration-2">🧺</div>
<div class="laundry-decoration decoration-3">🧼</div>

<nav>
  <div class="logo"><a href="index.html">Washly</a></div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="catalogue.html">Catalogue</a>
  </div>
</nav>

<div class="login-wrapper">
  <!-- LEFT: LOGIN CARD -->
  <div class="login-box">
    <h2>Welcome Back</h2>
    <p class="sub">Sign in to your account</p>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="input-group">
        <span class="input-icon">✉️</span>
        <input type="email" placeholder="Email Address" required>
      </div>
      <div class="input-group">
        <span class="input-icon">🔒</span>
        <input type="password" placeholder="Password" required>
      </div>

      <div class="form-options">
        <label class="checkbox-label">
          <input type="checkbox">
          <span>Remember me</span>
        </label>
        <a href="#">Forgot password?</a>
      </div>

      <button type="submit">Sign In</button>
    </form>

    <p class="signup">Don't have an account? <span onclick="openSignupModal()">Sign up</span></p>
  </div>

  <!-- RIGHT: VISUAL -->
  <div class="visual">
    <div class="visual-bg"></div>
    <img src="https://cdn-icons-png.flaticon.com/512/3081/3081559.png" alt="Laundry Illustration">
  </div>
</div>

<!-- SIGNUP MODAL -->
<div class="modal" id="signupModal">
  <div class="modal-content">
    <h2>Create Account</h2>
    <p class="sub">Join Washly for seamless laundry service</p>

    <form id="signupForm" onsubmit="handleSignup(event)">
      <div class="form-row">
        <input type="text" id="fullName" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email Address" required>
      </div>

      <div class="form-row">
        <input type="tel" id="phone" placeholder="Phone Number" pattern="[0-9]{10}" required>
        <select id="gender" required>
          <option value="">Select Gender</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="form-row full">
        <input type="text" id="address" placeholder="Address" required>
      </div>

      <div class="form-row">
        <input type="text" id="city" placeholder="City" required>
        <input type="text" id="pincode" placeholder="Pincode" pattern="[0-9]{6}" required>
      </div>

      <div class="form-row full">
        <input type="password" id="password" placeholder="Password" required>
      </div>

      <div class="form-row full">
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
      </div>

      <div class="terms-checkbox">
        <input type="checkbox" id="termsCheckbox" required>
        <label for="termsCheckbox">
          I agree to the <a href="#">Terms and Conditions</a> and <a href="#">Privacy Policy</a>
        </label>
      </div>

      <div class="modal-buttons">
        <button type="button" class="btn-secondary" onclick="closeSignupModal()">Cancel</button>
        <button type="submit" class="btn-primary">Create Account</button>
      </div>
    </form>
  </div>
</div>

<script>
  function openSignupModal() {
    document.getElementById('signupModal').classList.add('show');
  }

  function closeSignupModal() {
    document.getElementById('signupModal').classList.remove('show');
    document.getElementById('signupForm').reset();
  }

  function handleLogin(event) {
    event.preventDefault();
    alert('Welcome back! (Demo: Login functionality would be integrated with backend)');
    document.getElementById('loginForm').reset();
  }

  function handleSignup(event) {
    event.preventDefault();

    // Get form data
    const formData = {
      fullName: document.getElementById('fullName').value,
      email: document.getElementById('email').value,
      phone: document.getElementById('phone').value,
      gender: document.getElementById('gender').value,
      address: document.getElementById('address').value,
      city: document.getElementById('city').value,
      pincode: document.getElementById('pincode').value,
      password: document.getElementById('password').value
    };

    // Validate passwords match
    if (document.getElementById('password').value !== document.getElementById('confirmPassword').value) {
      alert('Passwords do not match!');
      return;
    }

    // Validate terms checkbox
    if (!document.getElementById('termsCheckbox').checked) {
      alert('Please accept Terms and Conditions');
      return;
    }

    // Send email (this would require a backend service)
    sendAccountEmail(formData);

    // Show success message
    alert('Account created successfully! A confirmation email has been sent to ' + formData.email);
    closeSignupModal();
  }

  function sendAccountEmail(data) {
    // This would require a backend service (EmailJS, SendGrid, or custom backend)
    // For now, we'll create a simulated email object
    const emailBody = `
New Account Created at Washly

Name: ${data.fullName}
Email: ${data.email}
Phone: ${data.phone}
Gender: ${data.gender}
Address: ${data.address}
City: ${data.city}
Pincode: ${data.pincode}
Registration Time: ${new Date().toLocaleString()}

Please verify this account and add to your customer database.
    `;

    // In production, you would send this to your backend
    // Example with EmailJS (you'd need to set up an account):
    // emailjs.send('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', {
    //   to_email: 'deveesh765.ds@gmail.com',
    //   from_email: data.email,
    //   subject: 'New Washly Account Registration',
    //   message: emailBody
    // });

    console.log('Email would be sent to: deveesh765.ds@gmail.com');
    console.log('Account Data:', data);
  }

  // Close modal when clicking outside
  document.getElementById('signupModal').addEventListener('click', function(e) {
    if (e.target === this) {
      closeSignupModal();
    }
  });

  // Prevent form submission for demo
  document.getElementById('loginForm').addEventListener('submit', handleLogin);
  document.getElementById('signupForm').addEventListener('submit', handleSignup);
</script>

</body>
</html>
